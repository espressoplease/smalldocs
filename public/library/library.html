<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<title>SDocs - Library</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="/public/library/library.css">
</head>
<body>
  <div class="topbar">
    <a class="brand" href="/library">SDocs</a>
    <span class="brand-sep">/</span>
    <span class="brand-page">library</span>
    <span class="brand-sep">.</span>
    <span class="muted" id="status-line">loading...</span>
    <span style="flex:1"></span>
    <button class="btn ghost" id="rescan-btn">rescan</button>
  </div>

  <div id="agent-banner" hidden></div>

  <div class="container">
    <div class="input-block">
      <div class="input-row">
        <svg viewBox="0 0 16 16" width="15" height="15" class="search-ico" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"><circle cx="7" cy="7" r="5"/><path d="M14 14l-3.5-3.5"/></svg>
        <div id="chips-row" style="display:contents"></div>
        <input id="q" autofocus placeholder="search your library..." autocomplete="off" />
      </div>
      <div class="filter-strip" id="filter-strip">
        <span class="label">filter by</span>
        <button class="facet-button" data-facet="project" aria-expanded="false">
          project <svg class="chev" viewBox="0 0 10 6" fill="none"><path d="M1 1l4 4 4-4" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></svg>
        </button>
        <button class="facet-button" data-facet="path" aria-expanded="false">
          path <svg class="chev" viewBox="0 0 10 6" fill="none"><path d="M1 1l4 4 4-4" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></svg>
        </button>
        <button class="facet-button" data-facet="agent" aria-expanded="false">
          agent <svg class="chev" viewBox="0 0 10 6" fill="none"><path d="M1 1l4 4 4-4" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></svg>
        </button>
        <button class="facet-button" data-facet="since" aria-expanded="false">
          when <svg class="chev" viewBox="0 0 10 6" fill="none"><path d="M1 1l4 4 4-4" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></svg>
        </button>
        <button class="facet-button" data-facet="tag" aria-expanded="false">
          tag <svg class="chev" viewBox="0 0 10 6" fill="none"><path d="M1 1l4 4 4-4" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></svg>
        </button>
        <button class="strip-toggle" id="star-toggle" aria-pressed="false">
          <svg class="star-ico" viewBox="0 0 24 24"><path d="M12 2l3.09 6.26L22 9.27l-5 4.87 1.18 6.88L12 17.77l-6.18 3.25L7 14.14 2 9.27l6.91-1.01L12 2z" fill="currentColor" stroke="currentColor" stroke-width="1.5" stroke-linejoin="round"/></svg>
          starred
        </button>
        <button class="strip-clear" id="clear" hidden>clear all</button>
      </div>
      <div class="facet-panel" id="facet-panel">
        <div class="facet-panel-head">
          <h3 id="facet-panel-title">Project</h3>
          <span class="syntax-hint">click to add, or type the same form in the search box</span>
        </div>
        <div class="facet-options" id="facet-panel-options"></div>
      </div>
    </div>

    <div class="results-meta">
      <span class="results-count" id="count">0 results</span>
    </div>

    <div id="results"></div>
  </div>

  <script src="/public/library/library.js"></script>
</body>
</html>
